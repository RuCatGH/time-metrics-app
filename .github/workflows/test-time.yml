name: Test Time Route
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
jobs:
  test_time_route:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Test
        run: |
          chmod +x ./test/time-metrics-app.sh
          ./test/time-metrics-app.sh
